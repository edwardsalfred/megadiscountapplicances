<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Page not found · Mega Discount Appliances</title>
<link rel="icon" href="/assets/logo/megalogo.jpg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box}
body{
  margin:0;
  font-family:"Inter",system-ui,sans-serif;
  background:#F5F1E6;
  color:#0E1A33;
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:24px;
}
.box{max-width:520px;text-align:center;}
.code{
  font-family:"Anton",Impact,sans-serif;
  font-size:160px;
  line-height:1;
  color:#D62027;
  letter-spacing:-0.02em;
  margin:0 0 16px;
}
h1{
  font-family:"Anton",Impact,sans-serif;
  font-size:48px;
  text-transform:uppercase;
  margin:0 0 16px;
  color:#0F2A5C;
  font-weight:400;
  line-height:1;
}
p{color:#5A6478;margin:0 0 28px;font-size:1.05rem;}
a{
  display:inline-block;
  padding:14px 26px;
  background:#D62027;
  color:#fff;
  text-decoration:none;
  border-radius:999px;
  font-weight:600;
  font-size:0.95rem;
  letter-spacing:0.06em;
  text-transform:uppercase;
}
a:hover{background:#A8161D;}
</style>
</head>
<body>
<div class="box">
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>That page isn't in our showroom. Head back home and find the deal you're looking for.</p>
  <a href="/">Back to Home</a>
</div>
</body>
</html>
